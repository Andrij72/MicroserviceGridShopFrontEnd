<h2>🛍 Products</h2>

<div class="products-grid">
  <div class="product-card" *ngFor="let p of products$ | async">
    <img [src]="p.imageUrl || 'images/placeholder.jpg'" alt="{{ p.name }}">
    <h3>{{ p.name }}</h3>
    <p class="price">{{ p.price | currency:'EUR' }}</p>
    <div class="actions">
      <a [routerLink]="['/products', p.sku]" class="btn btn-details">Details</a>
      <button class="btn btn-add" (click)="addToCart(p)">Add to Cart 🛒</button>
    </div>
  </div>
</div>
