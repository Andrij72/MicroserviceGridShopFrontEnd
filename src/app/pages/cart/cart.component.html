<h2>🛒 Your Cart</h2>

<table *ngIf="cartService.cart().length > 0; else empty" class="cart-table" role="table" aria-label="Shopping cart">
  <thead>
  <tr>
    <th scope="col">Product</th>
    <th scope="col">Price</th>
    <th scope="col">Qty</th>
    <th scope="col">Total</th>
    <th scope="col" aria-hidden="true"></th>
  </tr>
  </thead>

  <tbody>
  <tr *ngFor="let item of cartService.cart()" role="row">
    <td role="cell">{{ item.name }}</td>
    <td role="cell">{{ item.price | currency:'EUR' }}</td>
    <td role="cell" class="qty-cell">
      <button
        type="button"
        class="icon-btn"
        title="Decrease quantity"
        aria-label="Decrease quantity"
        (click)="cartService.decrease(item)">
        −
      </button>

      <span class="qty">{{ item.quantity }}</span>

      <button
        type="button"
        class="icon-btn"
        title="Increase quantity"
        aria-label="Increase quantity"
        (click)="cartService.increase(item)">
        +
      </button>
    </td>
    <td role="cell">({{ item.price * item.quantity | currency:'EUR' }})</td>
    <td role="cell">
      <button
        type="button"
        class="danger"
        title="Remove item"
        aria-label="Remove item"
        (click)="cartService.removeItem(item.productId)">
        ✕
      </button>
    </td>
  </tr>
  </tbody>
</table>

<div class="summary" *ngIf="cartService.cart().length">
  <div>
    <strong>Total:</strong>
    <span class="total">({{ cartService.total() | currency:'EUR' }})</span>
  </div>

  <div class="actions">
    <button
      class="primary"
      [disabled]="isCreating"
      aria-disabled="{{ isCreating }}"
      title="Create order"
      (click)="createOrder()">
      {{ isCreating ? 'Creating...' : 'Create Order' }}
    </button>
  </div>
</div>

<ng-template #empty>
  <p>Cart is empty 🤷‍♂️</p>
</ng-template>
