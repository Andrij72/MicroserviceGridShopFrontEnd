<h2>📦 My Orders</h2>

<div class="order" *ngFor="let order of orders()">
  <p><strong>Order ID:</strong> {{ order.id }}</p>
  <p><strong>Total:</strong> {{ order.total | currency:'EUR' }}</p>

  <ul>
    <li *ngFor="let item of order.items">
      {{ item.name }} × {{ item.quantity }}
    </li>
  </ul>
</div>
