<div class="welcome-page">
  <h1>Welcome to MicroserviceGrid!</h1>
  <p>Discover the latest products of 2025.</p>

  <div *ngIf="!isAuthenticated()">
    <button routerLink="/register" class="btn-primary">Register to Start</button>
  </div>

  <div *ngIf="isAuthenticated()">
    <button routerLink="/products" class="btn-primary">Go to Products</button>
  </div>

  <p>
    You have {{ cartCount() }} product(s) in your cart (not paid).
  </p>
</div>
