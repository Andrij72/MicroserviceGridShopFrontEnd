<div class="products-container">
  <div class="product-card" *ngFor="let product of products">
    <img [src]="product.image || 'images/placeholder.jpg'" alt="{{product.name}}" class="product-image">
    <div class="product-details">
      <h4 class="product-name">{{ product.name }}</h4>
      <p class="product-description">{{ product.description }}</p>
      <div class="product-footer">
        <span class="product-price">{{ product.price | currency:'USD':'symbol' }}</span>
        <button (click)="addToCart(product)" class="add-to-cart">Add to cart</button>
      </div>
    </div>
  </div>
</div>
