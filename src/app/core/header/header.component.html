<header class="app-header">
  <div class="logo" routerLink="/home">🛒 MicroserviceGrid</div>

  <nav class="nav-links">
    <a routerLink="/products">Products</a>
    <a *ngIf="isAuthenticated() && !isAdmin()" routerLink="/orders">Orders</a>
    <a *ngIf="isAuthenticated() && isAdmin()" routerLink="/admin">Admin</a>

    <!-- Cart Icon -->
    <a routerLink="/cart" class="cart-icon">
      <span class="material-icons">shopping_cart</span>
      <span class="badge" *ngIf="cartCount() > 0">{{ cartCount() }}</span>
    </a>
  </nav>

  <div class="user-info">
    <span *ngIf="isAuthenticated()">Hello, {{ username() }}</span>
    <button *ngIf="!isAuthenticated()" (click)="login()">Login</button>
    <button *ngIf="isAuthenticated()" (click)="logout()">Logout</button>
  </div>
</header>
